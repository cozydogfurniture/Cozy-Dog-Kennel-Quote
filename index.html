<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <meta name="apple-mobile-web-app-title" content="Slab Pricer"/>
  <title>Slab Pricer Pro</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{background:#f4f4f0;font-family:Arial,sans-serif;color:#1a1a0e;}
    .hdr{background:#1a1a0e;border-bottom:3px solid #f5b800;padding:.85rem 1rem;display:flex;align-items:center;gap:.75rem;}
    .hdr img{height:46px;width:auto;}
    .hdr-title{font-size:1.05rem;font-weight:900;color:#fff;letter-spacing:.08em;text-transform:uppercase;}
    .hdr-sub{font-size:.58rem;color:#aaa890;letter-spacing:.12em;text-transform:uppercase;margin-top:.1rem;}
    .page{padding:.85rem;display:flex;flex-direction:column;gap:.85rem;max-width:640px;margin:0 auto;}
    .card{background:#fff;border:1px solid #e0ddd4;border-radius:8px;padding:1rem;box-shadow:0 1px 4px rgba(0,0,0,.06);}
    .card-title{font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;font-weight:800;margin-bottom:.85rem;padding-bottom:.5rem;border-bottom:2px solid #f5b800;}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;}
    .field{display:flex;flex-direction:column;gap:.28rem;}
    .lbl{font-size:.62rem;color:#6b6650;letter-spacing:.1em;text-transform:uppercase;font-weight:700;}
    input,select{background:#fff;border:1.5px solid #e0ddd4;color:#1a1a0e;font-family:Arial,sans-serif;font-size:.95rem;padding:.55rem .75rem;outline:none;width:100%;border-radius:6px;-webkit-appearance:none;}
    input[type=number]{-moz-appearance:textfield;}
    .w-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(68px,1fr));gap:.4rem;}
    .w-inp{text-align:center;padding:.5rem .4rem;}
    .w-lbl{font-size:.55rem;color:#6b6650;text-align:center;letter-spacing:.08em;text-transform:uppercase;font-weight:700;margin-bottom:.2rem;}
    .pt-btns{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.75rem;}
    .pt-btn{padding:.35rem .85rem;border:1.5px solid #e0ddd4;border-radius:5px;cursor:pointer;font-size:.72rem;font-family:Arial,sans-serif;background:#fff;color:#6b6650;}
    .pt-btn.active{background:#f5b800;border-color:#f5b800;color:#1a1a0e;font-weight:800;}
    .chip{padding:.55rem .65rem;background:#fff;border:1.5px solid #e0ddd4;border-radius:6px;cursor:pointer;font-size:.78rem;line-height:1.3;color:#6b6650;user-select:none;}
    .chip.active-amber{background:#f5b800;border-color:#f5b800;color:#1a1a0e;font-weight:700;}
    .chip.active-green{background:rgba(58,122,42,.1);border-color:#3a7a2a;color:#3a7a2a;font-weight:700;}
    .chip-mult{font-size:.6rem;color:#f5b800;}
    .chip.active-amber .chip-mult{color:#1a1a0e;}
    .chip-desc{font-size:.6rem;color:#6b6650;margin-top:.1rem;}
    .chip-sub{font-size:.6rem;color:#5aaa3a;margin-top:.15rem;}
    .profile-box{background:#f9f8f4;border:1.5px solid #e0ddd4;border-radius:6px;padding:.75rem;margin-top:.75rem;}
    .avg-lbl{font-size:.68rem;color:#6b6650;margin-top:.4rem;text-align:right;font-weight:700;}
    .divider{border-top:3px solid #f5b800;}
    .meta-row{display:flex;justify-content:space-between;align-items:center;padding:.65rem .85rem;background:#f9f8f4;margin-bottom:2px;border-radius:4px;}
    .meta-lbl{font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;color:#6b6650;font-weight:700;}
    .meta-val{font-size:.9rem;font-weight:500;}
    .price-hero{background:#f5b800;border-radius:8px;padding:1.25rem;text-align:center;margin-bottom:1rem;}
    .price-lbl{font-size:.62rem;color:#6b6650;letter-spacing:.12em;text-transform:uppercase;margin-bottom:.2rem;font-weight:700;}
    .price-big{font-size:3rem;font-weight:900;color:#1a1a0e;line-height:1;}
    .price-range{font-size:.65rem;color:#6b6650;margin-top:.25rem;font-weight:600;}
    .y-bar-wrap{height:22px;background:#e0ddd4;border-radius:4px;display:flex;overflow:hidden;margin:.5rem 0;}
    .y-bar-usable{background:#3a7a2a;display:flex;align-items:center;justify-content:center;}
    .y-bar-wane{background:#5a4020;}
    .y-bar-lbl{font-size:.58rem;color:#0f2008;font-weight:bold;}
    .lgnd{display:flex;gap:1rem;font-size:.62rem;color:#6b6650;flex-wrap:wrap;}
    .pb-row{display:flex;justify-content:space-between;align-items:center;padding:.6rem .85rem;background:#f9f8f4;margin-bottom:2px;border-radius:4px;}
    .pb-row.last{background:rgba(245,184,0,.15);}
    .pb-lbl{font-size:.62rem;color:#6b6650;}
    .pb-lbl.last{color:#c49200;}
    .pb-val{font-size:.82rem;color:#1a1a0e;}
    .pb-val.last{font-size:1rem;color:#f5b800;font-weight:bold;}
    .sec-lbl{font-size:.58rem;color:#6b6650;letter-spacing:.12em;text-transform:uppercase;margin-top:1rem;margin-bottom:.25rem;}
    .empty{text-align:center;padding:2rem 1rem;color:#c8c4b0;}
    .empty-dash{font-size:2.5rem;margin-bottom:.5rem;}
    .empty-txt{font-size:.72rem;line-height:1.8;}
    .dollar-wrap{display:flex;}
    .dollar-prefix{background:#f9f8f4;border:1.5px solid #e0ddd4;border-right:none;padding:.55rem .5rem;color:#6b6650;font-size:.85rem;border-radius:6px 0 0 6px;white-space:nowrap;}
    .dollar-inp{border-left:none!important;border-radius:0 6px 6px 0!important;}
  </style>
</head>

  <div><div class="hdr-title">Slab Pricer Pro</div><div class="hdr-sub">Live Edge Lumber Pricing System</div></div>
</div>
<div class="page">
  <!-- ① Species -->
  <div class="card">
    <div class="card-title">① Species &amp; Base Rate</div>
    <div class="grid2" style="margin-bottom:.6rem">
      <div class="field">
        <div class="lbl">Species</div>
        <select id="sp" onchange="onSpecies(this.value)">
          <option>Black Walnut</option><option>White Oak</option><option>Hard Maple</option>
          <option>Cherry</option><option>Ash</option><option>Elm</option>
          <option>Sycamore</option><option>Cedar</option><option>Live Oak</option>
          <option>Mesquite</option><option>Custom</option>
        </select>
      </div>
      <div class="field">
        <div class="lbl">Rate $/BF <span style="color:#f5b800;font-size:.5rem">EDITABLE</span></div>
        <div class="dollar-wrap">
          <span class="dollar-prefix">$</span>
          <input class="dollar-inp" id="rate" type="number" value="9" inputmode="decimal" step="0.5" min="0" onchange="recalc()" onblur="recalc()"/>
        </div>
      </div>
    </div>
    <div class="field" id="custom-name-row" style="display:none">
      <div class="lbl">Species Name</div>
      <input id="customName" type="text" placeholder="e.g. Mulberry"/>
    </div>
  </div>

  <!-- ② Dimensions -->
  <div class="card">
    <div class="card-title">② Dimensions</div>
    <div class="grid2">
      <div class="field"><div class="lbl">Thickness (in) *</div>
        <input id="thickness" type="number" inputmode="decimal" placeholder="e.g. 2.5" step="0.25" min="0" onchange="recalc()" onblur="recalc()"/>
      </div>
      <div class="field"><div class="lbl">Length (ft) *</div>
        <input id="lengthFt" type="number" inputmode="decimal" placeholder="e.g. 8" step="0.5" min="0" onchange="recalc()" onblur="recalc()"/>
      </div>
    </div>
  </div>

  <!-- ③ Widths -->
  <div class="card">
    <div class="card-title">③ Width Measurements (inches)</div>
    <div class="pt-btns" id="pt-btns"></div>
    <div class="w-grid" id="w-grid"></div>
    <div class="profile-box" id="profile-box"></div>
    <div class="avg-lbl" id="avg-lbl" style="display:none"></div>
  </div>

  <!-- ④ Wane -->
  <div class="card">
    <div class="card-title">④ Live Edge Wane</div>
    <div class="grid2" id="wane-chips"></div>
  </div>

  <!-- ⑤ Quality -->
  <div class="card">
    <div class="card-title">⑤ Quality Grade</div>
    <div class="grid2" id="qual-chips"></div>
  </div>

  <!-- ⑥ Drying -->
  <div class="card">
    <div class="card-title">⑥ Drying Status</div>
    <div class="grid2" id="dry-chips"></div>
  </div>

  <!-- ⑦ Margin -->
  <div class="card">
    <div class="card-title">⑦ Profit Margin</div>
    <div style="max-width:180px">
      <div class="field"><div class="lbl">Target Margin %</div>
        <input id="margin" type="number" inputmode="decimal" value="20" step="5" min="0" max="300" onchange="recalc()" onblur="recalc()"/>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Summary -->
  <div class="card">
    <div class="card-title">Pricing Summary</div>
    <div id="summary"></div>
  </div>
</div>

<script>
const QUALITY=[{l:"Standard",d:"Clean, minimal figure",m:1.0},{l:"Select",d:"Nice grain, few defects",m:1.35},{l:"Premium",d:"Strong figure, dramatic grain",m:1.75},{l:"Showcase",d:"Exceptional burl, crotch, figure",m:2.4}];
const DRYING=[{l:"Green (fresh cut)",m:0.7},{l:"Air-dried (partial)",m:0.85},{l:"Air-dried (complete)",m:1.0},{l:"Kiln-dried",m:1.2}];
const WANE=[{l:"Minimal ≤1\"",p:0.06},{l:"Moderate 1–2\"",p:0.12},{l:"Heavy 2–4\"",p:0.20},{l:"Very Heavy >4\"",p:0.30}];

let numPts=5, waneIdx=1, qualIdx=0, dryIdx=2;
let widths=Array(10).fill("");

function g(id){return document.getElementById(id);}

function onSpecies(v){
  g("custom-name-row").style.display=v==="Custom"?"":"none";
}

function setNumPts(n){
  numPts=n;
  renderPtBtns();
  renderWidthGrid();
  recalc();
}

function setWane(i){waneIdx=i;renderChips("wane-chips",WANE.map(w=>w.l),waneIdx,"setWane","amber");}
function setQual(i){qualIdx=i;renderQualChips();}
function setDry(i){dryIdx=i;renderChips("dry-chips",DRYING.map(d=>d.l+" ×"+d.m),dryIdx,"setDry","green");}

function renderPtBtns(){
  g("pt-btns").innerHTML=[3,5,7,10].map(n=>`<button class="pt-btn${numPts===n?" active":""}" onclick="setNumPts(${n})">${n} points</button>`).join("");
}

function renderWidthGrid(){
  const labels=Array.from({length:numPts},(_,i)=>i===0?"End A":i===numPts-1?"End B":"W"+(i+1));
  g("w-grid").innerHTML=labels.map((lbl,i)=>`
    <div>
      <div class="w-lbl">${lbl}</div>
      <input class="w-inp" type="number" inputmode="decimal" id="w${i}" value="${widths[i]}" placeholder="—" step="0.25" min="0"
        onchange="widths[${i}]=this.value;recalc()"
        onblur="widths[${i}]=this.value;recalc()"/>
    </div>`).join("");
}

function renderChips(containerId,labels,activeIdx,fn,style){
  g(containerId).innerHTML=labels.map((l,i)=>`<div class="chip${activeIdx===i?" active-"+style:""}" onclick="${fn}(${i})">${l}</div>`).join("");
}

function renderQualChips(){
  g("qual-chips").innerHTML=QUALITY.map((q,i)=>`<div class="chip${qualIdx===i?" active-amber":""}" onclick="setQual(${i})"><div class="chip-mult">×${q.m.toFixed(2)}</div><div style="font-weight:bold;margin:.1rem 0">${q.l}</div><div class="chip-desc">${q.d}</div></div>`).join("");
}

function drawProfile(){
  const pts=Array.from({length:numPts},(_,i)=>parseFloat(widths[i])||0);
  const maxW=Math.max(...pts,1);
  const W=320,H=80;
  const step=pts.length>1?W/(pts.length-1):W/2;
  const tp=pts.map((w,i)=>({cx:pts.length===1?W/2:i*step,top:H-12-(w/maxW)*(H-24),bot:H-12,w}));
  const avgW=pts.filter(p=>p>0).length?pts.filter(p=>p>0).reduce((a,b)=>a+b,0)/pts.filter(p=>p>0).length:0;
  const avgY=avgW>0?H-12-(avgW/maxW)*(H-24):null;
  const topLine=tp.map(p=>p.cx+","+p.top).join(" ");
  const botLine=tp.map(p=>p.cx+","+p.bot).join(" ");
  const fill=tp.map((p,i)=>(i===0?"M":"L")+p.cx+","+p.top).join(" ")+" "+[...tp].reverse().map(p=>"L"+p.cx+","+p.bot).join(" ")+" Z";
  let svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block;height:70px">`;
  if(pts.some(p=>p>0)){
    svg+=`<path d="${fill}" fill="rgba(245,184,0,0.10)" stroke="none"/>`;
    svg+=`<polyline points="${topLine}" fill="none" stroke="#f5b800" stroke-width="2"/>`;
    svg+=`<polyline points="${botLine}" fill="none" stroke="#e0ddd4" stroke-width="1" stroke-dasharray="4,3"/>`;
  }
  if(avgY!==null) svg+=`<line x1="0" y1="${avgY}" x2="${W}" y2="${avgY}" stroke="#f5b800" stroke-width="1" stroke-dasharray="6,3" opacity="0.6"/>`;
  tp.forEach(p=>{
    svg+=`<line x1="${p.cx}" y1="${p.top}" x2="${p.cx}" y2="${p.bot}" stroke="#ccc" stroke-width="0.5"/>`;
    svg+=`<circle cx="${p.cx}" cy="${p.top}" r="${p.w>0?3:1.5}" fill="${p.w>0?"#1a1a0e":"#e0ddd4"}"/>`;
    if(p.w>0) svg+=`<text x="${p.cx}" y="${p.top-5}" text-anchor="middle" fill="#1a1a0e" font-size="7" font-family="Arial">${p.w}"</text>`;
  });
  svg+=`</svg><div style="display:flex;justify-content:space-between;margin-top:.2rem"><span style="font-size:.55rem;color:#c8c4b0">End A</span><span style="font-size:.55rem;color:#c8c4b0">End B</span></div>`;
  return svg;
}

function pct(a,b){return b?Math.min(100,Math.round((a/b)*100)):0;}

function recalc(){
  const rate=parseFloat(g("rate").value)||0;
  const wNums=Array.from({length:numPts},(_,i)=>parseFloat(widths[i])||0).filter(w=>w>0);
  const avgW=wNums.length?wNums.reduce((a,b)=>a+b,0)/wNums.length:0;
  const lft=parseFloat(g("lengthFt").value)||0;
  const tin=parseFloat(g("thickness").value)||0;
  const gross=tin&&avgW&&lft?(tin*avgW*lft)/12:0;
  const waneBF=gross*WANE[waneIdx].p;
  const usable=Math.max(0,gross-waneBF);
  const waste=gross-usable;
  const yldPct=gross?Math.round((usable/gross)*100):0;
  const price=usable*rate*QUALITY[qualIdx].m*DRYING[dryIdx].m*(1+((parseFloat(g("margin").value)||0)/100));
  const ppbf=usable?price/usable:0;

  // Update profile without touching input fields
  g("profile-box").innerHTML=drawProfile();
  if(avgW>0){g("avg-lbl").style.display="";g("avg-lbl").textContent="avg width: "+avgW.toFixed(2)+'"';}
  else g("avg-lbl").style.display="none";

  // Update summary
  if(gross===0){
    g("summary").innerHTML=`<div class="empty"><div class="empty-dash">—</div><div class="empty-txt">Enter thickness, length,<br>and at least one width to begin</div></div>`;
    return;
  }
  const uPct=pct(usable,gross),wPct=pct(waneBF,gross);
  g("summary").innerHTML=`
    <div class="price-hero">
      <div class="price-lbl">Suggested Asking Price</div>
      <div class="price-big">$${price.toFixed(0)}</div>
      <div class="price-range">$${(price*.9).toFixed(0)} – $${(price*1.1).toFixed(0)} reasonable range</div>
    </div>
    ${[["Gross Board Feet",gross.toFixed(2)+" BF","#1a1a0e"],["Usable Board Feet",usable.toFixed(2)+" BF","#5aaa3a"],["Wane / Trim",waste.toFixed(2)+" BF","#e05040"],["Yield",yldPct+"%","#f5b800"],["Avg Width",avgW.toFixed(2)+'"',"#1a1a0e"],["Price per BF","$"+ppbf.toFixed(2),"#f5b800"]].map(([k,v,c])=>`<div class="meta-row"><span class="meta-lbl">${k}</span><span class="meta-val" style="color:${c}">${v}</span></div>`).join("")}
    <div class="sec-lbl">Yield Breakdown</div>
    <div class="y-bar-wrap"><div class="y-bar-usable" style="width:${uPct}%">${uPct>15?`<span class="y-bar-lbl">${uPct}%</span>`:""}</div><div class="y-bar-wane" style="width:${wPct}%"></div></div>
    <div class="lgnd"><span style="color:#5aaa3a">■ Usable ${uPct}%</span><span style="color:#8a6030">■ Wane ${wPct}%</span></div>
    <div class="sec-lbl">Price Build-Up</div>
    ${[["Base ("+usable.toFixed(1)+" BF × $"+rate+")",(usable*rate).toFixed(2),false],["Quality — "+QUALITY[qualIdx].l+" ×"+QUALITY[qualIdx].m,(usable*rate*QUALITY[qualIdx].m).toFixed(2),false],["Drying — "+DRYING[dryIdx].l+" ×"+DRYING[dryIdx].m,(usable*rate*QUALITY[qualIdx].m*DRYING[dryIdx].m).toFixed(2),false],["Margin +"+(parseFloat(g("margin").value)||0)+"%",price.toFixed(2),true]].map(([k,v,last])=>`<div class="pb-row${last?" last":""}"><span class="pb-lbl${last?" last":""}">${k}</span><span class="pb-val${last?" last":""}">$${v}</span></div>`).join("")}`;
}

// Init
renderPtBtns();
renderWidthGrid();
renderChips("wane-chips",WANE.map(w=>w.l),waneIdx,"setWane","amber");
renderQualChips();
renderChips("dry-chips",DRYING.map(d=>d.l+"  ×"+d.m),dryIdx,"setDry","green");
recalc();
</script>
</body>
</html>
